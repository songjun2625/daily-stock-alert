name: daily-screener

on:
  schedule:
    # KST = UTC+9. 각 장 시작 10분 전에만 발송 (장 시작 전 추천이 핵심 — close 발송은 새벽 시간이라 제외).
    #
    # 한국장 (코스피·코스닥)  09:00 KST 시작
    #   23:50 UTC = 08:50 KST  (장 시작 10분 전)
    #
    # 미장 (NYSE/NASDAQ) DST: 22:30 KST 시작 / 표준시: 23:30 KST 시작
    #   13:20 UTC = 22:20 KST  (DST 기준 장 시작 10분 전)
    #   표준시 기간엔 자동으로 70분 전 발송. cron 단순화 위해 단일 cron 유지.
    - cron: '50 23 * * 0-4'   # KR open  (KST 월~금 08:50)
    - cron: '20 13 * * 1-5'   # US open  (KST 월~금 22:20)
  workflow_dispatch:
    inputs:
      market:
        description: '시장 선택 (kr / us / both)'
        required: false
        default: 'both'
      test_recipient:
        description: '테스트 발송 — 이 이메일에만 발송 (비워두면 시트 전체 발송). "self" = GMAIL_USER 본인'
        required: false
        default: ''

permissions:
  contents: write          # picks.json 자동 커밋
  actions:  write          # pages.yml workflow_dispatch 트리거 (GITHUB_TOKEN 제약 우회)

jobs:
  screen-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }

      - name: Install deps
        run: pip install -r screener/requirements.txt

      - name: Decide which market
        id: pick-market
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "50 23 * * 0-4")  echo "market=kr"   >> $GITHUB_OUTPUT ;;
              "20 13 * * 1-5")  echo "market=us"   >> $GITHUB_OUTPUT ;;
              *)                echo "market=both" >> $GITHUB_OUTPUT ;;
            esac
          else
            echo "market=${{ github.event.inputs.market || 'both' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run screener and publish picks.json
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}   # 옵션 — 없으면 yfinance 폴백
        run: python -m screener.publish ${{ steps.pick-market.outputs.market }}

      - name: Fetch company info (DART 공시 + yfinance 어닝 + 섹터 모멘텀)
        env:
          OPEN_DART_KEY: ${{ secrets.OPEN_DART_KEY }}
        run: python tools/fetch_company_info.py
        continue-on-error: true   # 외부 API 일시 장애가 picks 발행을 막지 않도록

      - name: Fetch news signals (RSS + yfinance.news 호재/악재 자동 분류)
        run: python tools/news_scraper.py
        continue-on-error: true

      - name: Apply news score boost to picks
        run: python tools/apply_news_boost.py
        continue-on-error: true

      - name: Commit & push picks.json (only if changed)
        id: commit
        run: |
          git config user.name "daily-pick-bot"
          git config user.email "bot@dailypick.kr"
          git add landing/data/picks.json landing/data/company_info.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "data: ${{ steps.pick-market.outputs.market }} picks $(date -u +%Y-%m-%dT%H:%M)"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      # ⚠️ 중요: GITHUB_TOKEN 으로 푸시한 커밋은 다른 워크플로(pages.yml) 의
      # push 트리거를 발화시키지 않는다. workflow_dispatch 만 GITHUB_TOKEN 으로
      # 가능하므로 명시적으로 Pages 워크플로를 트리거해야 라이브 URL이 갱신된다.
      - name: Trigger Pages deploy (workaround for GITHUB_TOKEN 제약)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main

      # Gmail SMTP 직접 발송 (Apps Script 불필요, 어떤 Google 계정에서도 작동)
      # 구독자 목록은 공개 구글시트 CSV 에서 매번 fetch — 시트 행 추가 즉시 반영.
      # workflow_dispatch 의 test_recipient 입력이 있으면 한 명에게만 테스트 발송.
      - name: Resolve test recipient
        id: test_recipient
        if: github.event_name == 'workflow_dispatch'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          INPUT_RECIPIENT: ${{ github.event.inputs.test_recipient }}
        run: |
          if [ -z "$INPUT_RECIPIENT" ]; then
            echo "email=" >> $GITHUB_OUTPUT
          elif [ "$INPUT_RECIPIENT" = "self" ]; then
            echo "email=$GMAIL_USER" >> $GITHUB_OUTPUT
          else
            echo "email=$INPUT_RECIPIENT" >> $GITHUB_OUTPUT
          fi

      - name: Send emails (production = subscribers / test = single recipient)
        if: env.GMAIL_USER != '' && (steps.commit.outputs.changed == 'true' || steps.test_recipient.outputs.email != '')
        env:
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          SUBSCRIBERS_SHEET_CSV: ${{ secrets.SUBSCRIBERS_SHEET_CSV }}
          TEST_RECIPIENT_EMAIL:  ${{ steps.test_recipient.outputs.email }}
        run: python tools/send_emails.py

      # (옵션) Slack 요약 발송
      - name: Slack notification
        if: steps.commit.outputs.changed == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python tools/notify_update.py

      - name: Optional alimtalk send (only if AUTO_SEND=true and templates approved)
        if: ${{ env.AUTO_SEND == 'true' }}
        env:
          AUTO_SEND: ${{ secrets.AUTO_SEND }}
          SOLAPI_API_KEY:    ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER:     ${{ secrets.SOLAPI_SENDER }}
          ALIMTALK_PFID:     ${{ secrets.ALIMTALK_PFID }}
          ALIMTALK_TEMPLATE_ID_KR: ${{ secrets.ALIMTALK_TEMPLATE_ID_KR }}
          ALIMTALK_TEMPLATE_ID_US: ${{ secrets.ALIMTALK_TEMPLATE_ID_US }}
          SUBSCRIBERS_JSON: ./subscribers.json
        run: |
          if [ "${{ steps.pick-market.outputs.market }}" = "kr" ]; then
            python orchestrator.py run_kr
          elif [ "${{ steps.pick-market.outputs.market }}" = "us" ]; then
            python orchestrator.py run_us
          fi
