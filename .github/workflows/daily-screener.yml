name: daily-screener

on:
  schedule:
    # KST = UTC+9. 각 장 "시작 직전"에 신선한 데이터로 갱신.
    #
    # 한국장 (코스피·코스닥)  09:00 KST 시작
    #   23:00 UTC = 08:00 KST  (장 시작 1시간 전 — 1차 갱신)
    #   23:25 UTC = 08:25 KST  (장 시작 35분 전, 알림톡 08:30 직전 — 2차 갱신)
    #
    # 미장 (NYSE/NASDAQ) 22:30~23:30 KST 시작 (서머타임에 따라 변동)
    #   12:00 UTC = 21:00 KST  (개장 1시간 30분~30분 전 — 1차 갱신)
    #   12:55 UTC = 21:55 KST  (알림톡 22:00 직전 — 2차 갱신)
    #
    # cron 요일은 UTC 기준이라 'KST 평일' = 'UTC 일~목 23:00 또는 UTC 월~금 12:00'
    - cron: '0 23 * * 0-4'    # KR  1차 (KST 월~금 08:00)
    - cron: '25 23 * * 0-4'   # KR  2차 (KST 월~금 08:25)
    - cron: '0 12 * * 1-5'    # US  1차 (KST 월~금 21:00)
    - cron: '55 12 * * 1-5'   # US  2차 (KST 월~금 21:55)
  workflow_dispatch:
    inputs:
      market:
        description: '시장 선택 (kr / us / both)'
        required: false
        default: 'both'

permissions:
  contents: write          # picks.json 자동 커밋
  actions:  write          # pages.yml workflow_dispatch 트리거 (GITHUB_TOKEN 제약 우회)

jobs:
  screen-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }

      - name: Install deps
        run: pip install -r screener/requirements.txt

      - name: Decide which market
        id: pick-market
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 23 * * 0-4"|"25 23 * * 0-4")  echo "market=kr"  >> $GITHUB_OUTPUT ;;
              "0 12 * * 1-5"|"55 12 * * 1-5")  echo "market=us"  >> $GITHUB_OUTPUT ;;
              *)                               echo "market=both" >> $GITHUB_OUTPUT ;;
            esac
          else
            echo "market=${{ github.event.inputs.market || 'both' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run screener and publish picks.json
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}   # 옵션 — 없으면 yfinance 폴백
        run: python -m screener.publish ${{ steps.pick-market.outputs.market }}

      - name: Commit & push picks.json (only if changed)
        id: commit
        run: |
          git config user.name "daily-pick-bot"
          git config user.email "bot@dailypick.kr"
          git add landing/data/picks.json
          if git diff --staged --quiet; then
            echo "no changes"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "data: ${{ steps.pick-market.outputs.market }} picks $(date -u +%Y-%m-%dT%H:%M)"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      # ⚠️ 중요: GITHUB_TOKEN 으로 푸시한 커밋은 다른 워크플로(pages.yml) 의
      # push 트리거를 발화시키지 않는다. workflow_dispatch 만 GITHUB_TOKEN 으로
      # 가능하므로 명시적으로 Pages 워크플로를 트리거해야 라이브 URL이 갱신된다.
      - name: Trigger Pages deploy (workaround for GITHUB_TOKEN 제약)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main

      # Gmail SMTP 직접 발송 (Apps Script 불필요, 어떤 Google 계정에서도 작동)
      # 구독자 목록은 공개 구글시트 CSV 에서 매번 fetch — 시트 행 추가 즉시 반영.
      - name: Send emails to subscribers
        if: steps.commit.outputs.changed == 'true' && env.GMAIL_USER != ''
        env:
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          SUBSCRIBERS_SHEET_CSV: ${{ secrets.SUBSCRIBERS_SHEET_CSV }}
        run: python tools/send_emails.py

      # (옵션) Slack 요약 발송
      - name: Slack notification
        if: steps.commit.outputs.changed == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python tools/notify_update.py

      - name: Optional alimtalk send (only if AUTO_SEND=true and templates approved)
        if: ${{ env.AUTO_SEND == 'true' }}
        env:
          AUTO_SEND: ${{ secrets.AUTO_SEND }}
          SOLAPI_API_KEY:    ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER:     ${{ secrets.SOLAPI_SENDER }}
          ALIMTALK_PFID:     ${{ secrets.ALIMTALK_PFID }}
          ALIMTALK_TEMPLATE_ID_KR: ${{ secrets.ALIMTALK_TEMPLATE_ID_KR }}
          ALIMTALK_TEMPLATE_ID_US: ${{ secrets.ALIMTALK_TEMPLATE_ID_US }}
          SUBSCRIBERS_JSON: ./subscribers.json
        run: |
          if [ "${{ steps.pick-market.outputs.market }}" = "kr" ]; then
            python orchestrator.py run_kr
          elif [ "${{ steps.pick-market.outputs.market }}" = "us" ]; then
            python orchestrator.py run_us
          fi
